# Qwen3.5-397B-A17B-FP8 Disaggregated 2P1D Heterogeneous NO-STAGING Control
# Same topology as staging version but SGLANG_DISAGG_STAGING_BUFFER disabled
# Prefill 0: TP4 standard -> uses slice transfer to DEP2 decode
# Prefill 1: DEP2 -> direct transfer (same attn_tp as decode)
# Control experiment to isolate staging-related issues

name: "qwen3.5-2p1d-hetero-nostaging-longbenchv2"

model:
  path: "qwen3.5-fp8"
  container: "dev-0318"
  precision: "fp8"

resources:
  gpu_type: "gb200"
  gpus_per_node: 4
  prefill_nodes: 2
  decode_nodes: 1
  prefill_workers: 2
  decode_workers: 1

backend:

  prefill_environment:
    TORCH_DISTRIBUTED_DEFAULT_TIMEOUT: "1800"
    PYTHONUNBUFFERED: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_CUMEM_ENABLE: "1"
    MC_FORCE_MNNVL: "1"
    SGLANG_DG_CACHE_DIR: "/configs/deepgemm-cache"
    FLASHINFER_WORKSPACE_BASE: "/configs/flashinfer-cache"
    SGLANG_DISAGGREGATION_HEARTBEAT_MAX_FAILURE: "100000"
    SGLANG_DISAGGREGATION_BOOTSTRAP_TIMEOUT: "100000"
    SGLANG_DISAGGREGATION_WAITING_TIMEOUT: "100000"
    SGLANG_MOONCAKE_CUSTOM_MEM_POOL: "True"
    SGLANG_USE_MESSAGE_QUEUE_BROADCASTER: "0"
    SGLANG_DISABLE_TP_MEMORY_INBALANCE_CHECK: "1"

  decode_environment:
    TORCH_DISTRIBUTED_DEFAULT_TIMEOUT: "1800"
    PYTHONUNBUFFERED: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_CUMEM_ENABLE: "1"
    MC_FORCE_MNNVL: "1"
    SGLANG_DG_CACHE_DIR: "/configs/deepgemm-cache"
    FLASHINFER_WORKSPACE_BASE: "/configs/flashinfer-cache"
    SGLANG_DISAGGREGATION_HEARTBEAT_MAX_FAILURE: "100000"
    SGLANG_DISAGGREGATION_BOOTSTRAP_TIMEOUT: "100000"
    SGLANG_DISAGGREGATION_WAITING_TIMEOUT: "100000"
    SGLANG_DECODE_BOOTSTRAP_TIMEOUT: "1000"
    SGLANG_HACK_SEQ_BOOTSTRAP_ROOM: "1"
    SGLANG_MOONCAKE_CUSTOM_MEM_POOL: "True"
    SGLANG_USE_MESSAGE_QUEUE_BROADCASTER: "0"
    SGLANG_DISABLE_TP_MEMORY_INBALANCE_CHECK: "1"

  sglang_config:
    prefill_groups:
      # Worker 0: TP4 standard (attn_tp_size=4, will use slice transfer)
      - served-model-name: "Qwen/Qwen3.5-397B-A17B-FP8"
        model-path: "/model/"

        attention-backend: "trtllm_mha"
        kv-cache-dtype: "fp8_e4m3"

        tensor-parallel-size: 4
        data-parallel-size: 1
        expert-parallel-size: 1

        mamba-scheduler-strategy: "no_buffer"
        disable-radix-cache: true
        mamba-track-interval: 2048
        mamba-ssm-dtype: "bfloat16"

        disaggregation-mode: "prefill"

        mem-fraction-static: 0.80
        chunked-prefill-size: 16384
        load-balance-method: "round_robin"
        watchdog-timeout: 1000000

      # Worker 1: DEP2 prefill (attn_tp_size=2, direct transfer)
      - served-model-name: "Qwen/Qwen3.5-397B-A17B-FP8"
        model-path: "/model/"

        attention-backend: "trtllm_mha"
        quantization: "fp8"
        kv-cache-dtype: "fp8_e4m3"
        moe-runner-backend: "flashinfer_trtllm"

        tensor-parallel-size: 4
        data-parallel-size: 2
        expert-parallel-size: 2
        enable-dp-attention: true
        enable-dp-lm-head: true
        moe-dense-tp-size: 1

        mamba-scheduler-strategy: "no_buffer"
        disable-radix-cache: true
        mamba-track-interval: 2048
        mamba-ssm-dtype: "bfloat16"

        disaggregation-mode: "prefill"

        mem-fraction-static: 0.80
        chunked-prefill-size: 16384
        load-balance-method: "round_robin"
        watchdog-timeout: 1000000

    decode:
      served-model-name: "Qwen/Qwen3.5-397B-A17B-FP8"
      model-path: "/model/"

      attention-backend: "trtllm_mha"
      quantization: "fp8"
      kv-cache-dtype: "fp8_e4m3"
      moe-runner-backend: "flashinfer_trtllm"

      # DEP2: DP2 + TP4 + EP2 with dp-attention (atten_tpsize=2)
      tensor-parallel-size: 4
      data-parallel-size: 2
      expert-parallel-size: 2
      enable-dp-attention: true
      enable-dp-lm-head: true
      moe-dense-tp-size: 1

      mamba-scheduler-strategy: "no_buffer"
      disable-radix-cache: true
      mamba-track-interval: 2048
      mamba-ssm-dtype: "bfloat16"

      disaggregation-mode: "decode"

      mem-fraction-static: 0.80
      chunked-prefill-size: 16384
      cuda-graph-max-bs: 1024
      decode-log-interval: 1
      stream-interval: 50
      watchdog-timeout: 1000000

benchmark:
  type: "longbenchv2"
  max_context_length: 128000
  num_threads: 32
  max_tokens: 16384
