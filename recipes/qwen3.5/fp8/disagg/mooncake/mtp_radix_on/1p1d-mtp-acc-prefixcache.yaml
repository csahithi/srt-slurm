# Qwen3.5-397B-A17B-FP8 Disagg 1P1D + MTP + Prefix Caching Accuracy Verification (GPQA)
# TP4 Prefill + TP4 Decode with EAGLE speculative decoding
# Prefill: extra_buffer + radix cache (prefix caching on prefill side)
# Decode: extra_buffer + max-mamba-cache-size=2x (disagg forces disable_radix_cache=True)
#
# IMPORTANT: sglang ratio calc bug when disable_radix_cache=True + extra_buffer + spec dec:
#   ratio is hardcoded to 1, ignoring extra_buffer's ping-pong overhead (2 mamba slots/req).
#   Must explicitly set max-mamba-cache-size >= 2 * max-running-requests to compensate.
#
# Purpose: reproduce/investigate low accuracy (0.71/0.61 on GSM8K) in disagg + MTP + prefix caching

name: "qwen3.5-1p1d-tp4-mtp-acc-prefixcache"

model:
  path: "qwen3.5-fp8"
  container: "dev"
  precision: "fp8"

extra_mount:
  - "/lustre/fsw/coreai_comparch_trtllm/yangminl/sglang:/sgl-workspace/sglang"

resources:
  gpu_type: "gb200"
  gpus_per_node: 4
  prefill_nodes: 1
  decode_nodes: 1
  prefill_workers: 1
  decode_workers: 1

backend:

  prefill_environment:
    TORCH_DISTRIBUTED_DEFAULT_TIMEOUT: "1800"
    PYTHONUNBUFFERED: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_CUMEM_ENABLE: "1"
    MC_FORCE_MNNVL: "1"
    SGLANG_DG_CACHE_DIR: "/configs/deepgemm-cache"
    FLASHINFER_WORKSPACE_BASE: "/configs/flashinfer-cache"
    SGLANG_DISAGGREGATION_HEARTBEAT_MAX_FAILURE: "100000"
    SGLANG_DISAGGREGATION_BOOTSTRAP_TIMEOUT: "100000"
    SGLANG_DISAGGREGATION_WAITING_TIMEOUT: "100000"
    SGLANG_MOONCAKE_CUSTOM_MEM_POOL: "True"
    SGLANG_USE_MESSAGE_QUEUE_BROADCASTER: "0"
    SGLANG_DISABLE_TP_MEMORY_INBALANCE_CHECK: "1"

  decode_environment:
    TORCH_DISTRIBUTED_DEFAULT_TIMEOUT: "1800"
    PYTHONUNBUFFERED: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_CUMEM_ENABLE: "1"
    MC_FORCE_MNNVL: "1"
    SGLANG_DG_CACHE_DIR: "/configs/deepgemm-cache"
    FLASHINFER_WORKSPACE_BASE: "/configs/flashinfer-cache"
    SGLANG_DISAGGREGATION_HEARTBEAT_MAX_FAILURE: "100000"
    SGLANG_DISAGGREGATION_BOOTSTRAP_TIMEOUT: "100000"
    SGLANG_DISAGGREGATION_WAITING_TIMEOUT: "100000"
    SGLANG_DECODE_BOOTSTRAP_TIMEOUT: "1000"
    SGLANG_HACK_SEQ_BOOTSTRAP_ROOM: "1"
    SGLANG_MOONCAKE_CUSTOM_MEM_POOL: "True"
    SGLANG_USE_MESSAGE_QUEUE_BROADCASTER: "0"
    SGLANG_DISABLE_TP_MEMORY_INBALANCE_CHECK: "1"

  sglang_config:
    prefill:
      served-model-name: "Qwen/Qwen3.5-397B-A17B-FP8"
      model-path: "/model/"
      trust-remote-code: true

      tensor-parallel-size: 4
      data-parallel-size: 1
      expert-parallel-size: 1

      attention-backend: "trtllm_mha"

      # prefix caching enabled: extra_buffer + radix cache (no disable-radix-cache)
      mamba-scheduler-strategy: "extra_buffer"
      mamba-track-interval: 2048
      mamba-ssm-dtype: "bfloat16"

      disaggregation-mode: "prefill"

      mem-fraction-static: 0.75
      chunked-prefill-size: 16384
      context-length: 262144

      load-balance-method: "round_robin"
      watchdog-timeout: 1000000
      max-running-requests: 64

    decode:
      served-model-name: "Qwen/Qwen3.5-397B-A17B-FP8"
      model-path: "/model/"
      trust-remote-code: true

      tensor-parallel-size: 4
      data-parallel-size: 1
      expert-parallel-size: 1

      attention-backend: "trtllm_mha"

      # Disagg decode forces disable_radix_cache=True (prefix caching is prefill-side only).
      # extra_buffer + EAGLE spec dec = 2 mamba slots per request (1 main + 1 ping-pong).
      # But sglang ratio calc uses ratio=1 for disable_radix_cache, not accounting for extra_buffer.
      # So we MUST set max-mamba-cache-size >= 2 * max-running-requests to avoid pool exhaustion.
      mamba-scheduler-strategy: "extra_buffer"
      mamba-track-interval: 2048
      mamba-ssm-dtype: "bfloat16"
      max-running-requests: 64
      # max-mamba-cache-size: 128

      # MTP: EAGLE speculative decoding
      speculative-algorithm: "EAGLE"
      speculative-num-steps: 2
      speculative-eagle-topk: 1
      speculative-num-draft-tokens: 3

      disaggregation-mode: "decode"

      mem-fraction-static: 0.75
      chunked-prefill-size: 16384
      context-length: 262144

      watchdog-timeout: 1000000

      enable-multimodal: true
      reasoning-parser: qwen3

benchmark:
  type: "gpqa"
  num_examples: 198
  max_tokens: 65536
  repeat: 1
  num_threads: 64
