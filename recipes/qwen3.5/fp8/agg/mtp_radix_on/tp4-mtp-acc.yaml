# Qwen3.5-397B-A17B-FP8 Aggregated TP4 + MTP Accuracy Verification (GSM8K)
# EAGLE speculative decoding, radix cache ON (prefix caching enabled)

name: "qwen3.5-agg-tp4-mtp-radix-acc"

model:
  path: "qwen3.5-fp8"
  container: "dev"
  precision: "fp8"

extra_mount:
  - "/lustre/fsw/coreai_comparch_trtllm/yangminl/sglang:/sgl-workspace/sglang"

dynamo:
  hash: "7edb07b5a7976c1a5c8581d2e2f7fe548c83f2bb"

resources:
  gpu_type: "gb200"
  gpus_per_node: 4
  agg_nodes: 1
  agg_workers: 1

backend:
  type: sglang

  aggregated_environment:
    PYTHONUNBUFFERED: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_CUMEM_ENABLE: "1"
    SGLANG_DG_CACHE_DIR: "/configs/deepgemm-cache"
    FLASHINFER_WORKSPACE_BASE: "/configs/flashinfer-cache"

  sglang_config:
    aggregated:
      served-model-name: "Qwen/Qwen3.5-397B-A17B-FP8"
      model-path: "/model/"
      trust-remote-code: true

      attention-backend: "trtllm_mha"
      quantization: "fp8"
      kv-cache-dtype: "fp8_e4m3"

      tensor-parallel-size: 4

      mamba-ssm-dtype: "bfloat16"
      moe-runner-backend: "flashinfer_trtllm"

      speculative-algorithm: "EAGLE"
      speculative-num-steps: 2
      speculative-eagle-topk: 1
      speculative-num-draft-tokens: 3

      mamba-scheduler-strategy: "extra_buffer"
      disable-radix-cache: false
      max-running-requests: 128
      mem-fraction-static: 0.8
      chunked-prefill-size: 16384
      max-prefill-tokens: 16384
      cuda-graph-max-bs: 128

      decode-log-interval: 1
      stream-interval: 50

benchmark:
  type: "gsm8k"
  num_examples: 1319
  max_tokens: 16000
  num_threads: 128
  num_shots: 8
